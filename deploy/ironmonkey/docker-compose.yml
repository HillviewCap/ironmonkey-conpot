# Conpot OT honeypot + forwarder sidecar for the IronMonkey threat-intel platform.
#
# This compose file lives separately from the upstream-Conpot root
# docker-compose.yml so it doesn't conflict with the upstream dev workflow.
# Run from THIS directory: `cd deploy/ironmonkey && docker compose up -d --build`.
#
# Deployment targets:
#   - snakeplskn (test bench): SENSOR_ID=sensor-lab-snakeplskn-01-ot routes
#     OT events to stix:honeypot:lab:queue and skips MISP side-write
#   - VPS production (future): SENSOR_ID=sensor-nyc-01-ot, .env overrides
#     point IRONPOT_URL=http://snakeplskn:8003 and REDIS_URL=redis://snakeplskn:6379/0
#     via Tailscale
#
# The forwarder uses network_mode: host so it can reach IronPot on
# localhost:8003 (snakeplskn) without manual docker-network plumbing.
# Conpot stays in default bridge mode so its port mappings work normally.

services:
  conpot:
    # honeynet/conpot on Docker Hub only publishes :latest -- no versioned
    # tags exist (verified 2026-05-25). To get a deterministic pin we build
    # from this fork's Dockerfile; the commit SHA on the checked-out branch
    # is the version.
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ironmonkey-conpot:local
    container_name: ironmonkey-conpot
    restart: unless-stopped
    volumes:
      # NOTE: the S7-315 substation template at ../../conpot/templates/s7-315-substation
      # is the single-file form Story 17.3 originally drafted. Conpot 0.6.0
      # requires a directory tree (template.xml + per-protocol XMLs in
      # subdirs: modbus/modbus.xml, s7comm/s7comm.xml, http/http.xml +
      # http/htdocs/, IEC104/IEC104.xml). Decomposing it is tracked as a
      # follow-up story; for now we use the in-image 'default' template
      # (Siemens S7-200, baseline modbus + s7comm + http + snmp) so the
      # IT->OT chain pipeline can be validated end-to-end.
      - ./conpot.cfg:/etc/conpot/conpot.cfg:ro
      - conpot-logs:/var/log/conpot
    ports:
      # Standard OT ports exposed on host → Conpot non-privileged internal ports
      - "502:5020"      # Modbus/TCP
      - "102:10201"     # S7Comm (ISO-TSAP)
      - "2404:2404"     # IEC-104
      - "8088:8800"     # SCADA HTTP (WinCC banner). Host port 8088 on
                        # snakeplskn (8080 belongs to Homer, 80 is reserved).
                        # On VPS prod, override to 80 in a per-host compose.
    # Conpot 0.6.0 doesn't accept a CLI flag for JSON logging -- it must be
    # enabled via the [json] section of conpot.cfg (mounted above).
    command: >
      -c /etc/conpot/conpot.cfg
      -t default
      --temp_dir /tmp

  conpot-forwarder:
    build: ./forwarder
    image: ironmonkey-conpot-forwarder:local
    container_name: ironmonkey-conpot-forwarder
    restart: unless-stopped
    # Host network so the forwarder can reach IronPot at localhost:8003
    # (snakeplskn test) or snakeplskn:8003 over Tailscale (VPS prod).
    network_mode: host
    volumes:
      # Conpot writes conpot.json here as the `conpot` user; the forwarder
      # only needs read access to tail it.
      - conpot-logs:/var/log/conpot:ro
      # Dedicated writable volume for the dead-letter spool. Owned by
      # `nobody:nogroup` via the forwarder image (see Dockerfile) so the
      # unprivileged process can append failed events without colliding
      # with conpot's UID on the shared conpot-logs volume.
      - forwarder-dead-letter:/var/spool/conpot-forwarder
    env_file:
      - ./forwarder/.env
    depends_on:
      - conpot

volumes:
  conpot-logs:
  forwarder-dead-letter:
